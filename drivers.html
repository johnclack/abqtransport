<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Drivers | Albuquerque Youth Transport</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .driver-tools {
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
      margin-top:24px;
      margin-bottom:18px;
    }
    .driver-search {
      width:min(100%, 420px);
      padding:14px 16px;
      border-radius:12px;
      border:1px solid rgba(230,145,56,.65);
      background:rgba(0,0,0,.42);
      color:#fff;
      font-size:1rem;
      outline:none;
    }
    .driver-search:focus {
      border-color:#ff9f43;
      box-shadow:0 0 0 3px rgba(230,145,56,.16);
    }
    .driver-count {
      color:#cfcfcf;
      font-size:.95rem;
    }
    .driver-list {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
      gap:12px;
      margin-top:18px;
    }
    .driver-button {
      min-height:62px;
      border:1.5px solid rgba(230,145,56,.68);
      border-radius:14px;
      background:linear-gradient(135deg, rgba(0,0,0,.72), rgba(255,255,255,.045));
      color:#fff;
      font-size:1.03rem;
      font-weight:780;
      text-align:left;
      padding:16px;
      cursor:pointer;
      transition:transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .driver-button:hover,
    .driver-button:focus-visible {
      transform:translateY(-3px);
      border-color:#ff9f43;
      background:linear-gradient(135deg, rgba(230,145,56,.18), rgba(255,255,255,.05));
      box-shadow:0 0 0 3px rgba(230,145,56,.16), 0 18px 38px rgba(0,0,0,.30);
      outline:none;
    }
    .loading, .error {
      margin-top:24px;
      padding:18px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);
      color:#ddd;
    }
    .error { border-color:rgba(230,145,56,.75); }
    .modal-backdrop {
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,.78);
      z-index:20;
    }
    .modal-backdrop.open { display:flex; }
    .driver-modal {
      width:min(100%, 430px);
      border:1.5px solid rgba(230,145,56,.75);
      border-radius:24px;
      background:linear-gradient(180deg, rgba(12,12,13,.98), rgba(0,0,0,.96));
      box-shadow:0 32px 90px rgba(0,0,0,.65);
      overflow:hidden;
      position:relative;
    }
    .modal-close {
      position:absolute;
      top:14px;
      right:14px;
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.55);
      color:#fff;
      font-size:1.5rem;
      cursor:pointer;
      z-index:2;
    }
    .driver-photo-wrap {
      height:520px;
      background:
        radial-gradient(circle at 30% 20%, rgba(230,145,56,.18), transparent 14rem),
        #111;
      display:grid;
      place-items:center;
      overflow:hidden;
    }
    .driver-photo {
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center top;
      display:none;
    }
    .driver-photo.visible { display:block; }
    .photo-placeholder {
      color:#e69138;
      font-size:4rem;
      font-weight:900;
      letter-spacing:-.08em;
    }
    .driver-profile { padding:24px; }
    .driver-profile h2 {
      margin:0;
      font-size:clamp(2rem, 5vw, 3.2rem);
      line-height:.95;
      letter-spacing:-.065em;
    }
    .credential-row {
      display:grid;
      gap:10px;
      margin-top:22px;
    }
    .credential {
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      border:1px solid rgba(255,255,255,.13);
      border-radius:12px;
      background:rgba(255,255,255,.045);
    }
    .credential .badge {
      width:30px;
      height:30px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-weight:900;
      flex:0 0 auto;
    }
    .credential.yes .badge {
      background:#e69138;
      color:#111;
    }
    .credential.no { opacity:.56; }
    .credential.no .badge {
      background:#333;
      color:#aaa;
    }
    .credential span:last-child { font-weight:760; }
    @media(max-width:560px) {
      .driver-photo-wrap { height:420px; }
      .driver-list { grid-template-columns:1fr; }
    }
  </style>
</head>
<body class="bg-page">
<header class="site-header shell">
  <nav class="topnav">
    <a href="index.html"><img src="assets/ayt-logo-narrow.jpg" alt="AYT"></a>
    <div class="toplinks">
      <a href="index.html">Main Menu</a>
      <a href="cancel.html">Cancel Ride</a>
      <a href="ride-tracking.html">Ride Tracking</a>
      <a href="families-agencies.html">Families & Agencies</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </nav>
</header>

<main class="shell">
  <section class="content-card">
    <p class="kicker">AYT</p>
    <h1>Drivers</h1>
    <p>Select a driver to view their photo and training/check status.</p>

    <div class="driver-tools">
      <input id="driverSearch" class="driver-search" type="search" placeholder="Search drivers..." aria-label="Search drivers">
      <span id="driverCount" class="driver-count"></span>
    </div>

    <div id="driverStatus" class="loading">Loading drivers...</div>
    <div id="driverList" class="driver-list"></div>

    <a class="back" href="index.html">← Back to main menu</a>
  </section>
</main>

<div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalName">
  <article class="driver-modal">
    <button id="modalClose" class="modal-close" type="button" aria-label="Close driver profile">×</button>
    <div class="driver-photo-wrap">
      <img id="modalPhoto" class="driver-photo" alt="">
      <div id="photoPlaceholder" class="photo-placeholder">AYT</div>
    </div>
    <div class="driver-profile">
      <h2 id="modalName"></h2>
      <div id="credentialRow" class="credential-row"></div>
    </div>
  </article>
</div>

<script>
  let allDrivers = [];

  const listEl = document.getElementById("driverList");
  const statusEl = document.getElementById("driverStatus");
  const countEl = document.getElementById("driverCount");
  const searchEl = document.getElementById("driverSearch");

  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalClose = document.getElementById("modalClose");
  const modalName = document.getElementById("modalName");
  const modalPhoto = document.getElementById("modalPhoto");
  const photoPlaceholder = document.getElementById("photoPlaceholder");
  const credentialRow = document.getElementById("credentialRow");

  function initials(name) {
    return String(name || "AYT")
      .split(/\s+/)
      .filter(Boolean)
      .slice(0, 2)
      .map(part => part[0])
      .join("")
      .toUpperCase() || "AYT";
  }


  function drivePhotoUrl(url) {
    const raw = String(url || "").trim();
    if (!raw) return "";

    const fileMatch = raw.match(/\/file\/d\/([^/]+)/);
    if (fileMatch) {
      return `https://drive.google.com/thumbnail?id=${fileMatch[1]}&sz=w1000`;
    }

    const idMatch = raw.match(/[?&]id=([^&]+)/);
    if (idMatch) {
      return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w1000`;
    }

    return raw;
  }

  function renderDrivers(drivers) {
    listEl.innerHTML = "";
    countEl.textContent = `${drivers.length} driver${drivers.length === 1 ? "" : "s"}`;

    if (!drivers.length) {
      statusEl.className = "loading";
      statusEl.textContent = "No drivers found.";
      statusEl.style.display = "block";
      return;
    }

    statusEl.style.display = "none";

    drivers.forEach(driver => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "driver-button";
      button.textContent = driver.name;
      button.addEventListener("click", () => openDriver(driver));
      listEl.appendChild(button);
    });
  }

  function credential(label, isYes) {
    const item = document.createElement("div");
    item.className = `credential ${isYes ? "yes" : "no"}`;

    const badge = document.createElement("span");
    badge.className = "badge";
    badge.textContent = isYes ? "✓" : "–";

    const text = document.createElement("span");
    text.textContent = label;

    item.appendChild(badge);
    item.appendChild(text);
    return item;
  }

  function openDriver(driver) {
    modalName.textContent = driver.name;
    modalPhoto.classList.remove("visible");
    modalPhoto.removeAttribute("src");
    modalPhoto.alt = `${driver.name} photo`;
    photoPlaceholder.textContent = initials(driver.name);
    photoPlaceholder.style.display = "block";

    if (driver.photo) {
      modalPhoto.onload = () => {
        modalPhoto.classList.add("visible");
        photoPlaceholder.style.display = "none";
      };
      modalPhoto.onerror = () => {
        modalPhoto.classList.remove("visible");
        photoPlaceholder.style.display = "block";
      };
      modalPhoto.src = drivePhotoUrl(driver.photo);
    }

    credentialRow.innerHTML = "";
    credentialRow.appendChild(credential("Background checked", Boolean(driver.backgroundCheck)));
    credentialRow.appendChild(credential("Carseat trained", Boolean(driver.carseatTraining)));
    credentialRow.appendChild(credential("CPR trained", Boolean(driver.cprTraining)));

    modalBackdrop.classList.add("open");
  }

  function closeModal() {
    modalBackdrop.classList.remove("open");
  }

  modalClose.addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", event => {
    if (event.target === modalBackdrop) closeModal();
  });
  document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeModal();
  });

  searchEl.addEventListener("input", () => {
    const q = searchEl.value.trim().toLowerCase();
    renderDrivers(allDrivers.filter(driver => driver.name.toLowerCase().includes(q)));
  });

  async function loadDrivers() {
    try {
      const response = await fetch("drivers.json", { cache: "no-store" });
      if (!response.ok) throw new Error("drivers.json could not be loaded.");

      allDrivers = await response.json();
      allDrivers = allDrivers
        .filter(driver => driver && driver.name)
        .sort((a, b) => a.name.localeCompare(b.name));

      renderDrivers(allDrivers);
    } catch (error) {
      console.error(error);
      statusEl.className = "error";
      statusEl.innerHTML = "The driver list could not be loaded. Make sure <strong>drivers.json</strong> is in the same folder as <strong>drivers.html</strong>.";
      countEl.textContent = "";
    }
  }

  loadDrivers();
</script>
</body>
</html>
