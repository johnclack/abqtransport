<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="stylesheet" href="styles.css">
  <style>
    .form-shell { overflow:hidden; padding:0; }
    .form-header {
      padding:clamp(22px,4vw,38px);
      border-bottom:1px solid rgba(255,255,255,.10);
    }
    .form-frame {
      background:#f3f4fb;
      padding:clamp(14px,3vw,34px);
    }
    .form-frame iframe {
      display:block;
      width:100%;
      min-height:1200px;
      border:0;
      background:#fff;
    }
  </style>
</head>
<body class="bg-page">
<header class="site-header shell">
  <nav class="topnav">
    <a href="index.html"><img src="assets/ayt-logo-narrow.jpg" alt="AYT"></a>
    <div class="toplinks">
      <a href="index.html">Main Menu</a>
      <a href="families-agencies.html">Families & Agencies</a>
      <a href="cancel.html">Cancel Ride</a>
      <a href="drivers.html">Drivers</a>
      <a href="ride-tracking.html">Ride Tracking</a>
      <a href="jobs.html">Jobs</a>
      <a href="safety.html">Safety</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </nav>
</header>

<main class="shell">
  <section class="content-card form-shell">
    <div class="form-header">
      <h1>Jobs</h1>
    </div>

    <div class="form-frame">
      <iframe
        id="JotFormIFrame-230475043223143"
        title="Jobs"
        onload="window.parent.scrollTo(0,0)"
        allowtransparency="true"
        allowfullscreen="true"
        allow="geolocation; microphone; camera"
        src="https://form.jotform.com/230475043223143"
        frameborder="0"
        style="min-width:100%;max-width:100%;height:1200px;border:none;"
        scrolling="no">
      </iframe>
    </div>
  </section>
</main>

<script type="text/javascript">
  var ifr = document.getElementById("JotFormIFrame-230475043223143");
  if (ifr) {
    var src = ifr.src;
    var iframeParams = [];
    if (window.location.href && window.location.href.indexOf("?") > -1) {
      iframeParams = iframeParams.concat(window.location.href.substr(window.location.href.indexOf("?") + 1).split('&'));
    }
    if (src && src.indexOf("?") > -1) {
      iframeParams = iframeParams.concat(src.substr(src.indexOf("?") + 1).split("&"));
      src = src.substr(0, src.indexOf("?"));
    }
    iframeParams.push("isIframeEmbed=1");
    ifr.src = src + "?" + iframeParams.join('&');
  }

  window.handleIFrameMessage = function(e) {
    if (typeof e.data === 'object') { return; }
    var args = e.data.split(":");
    var iframe;
    if (args.length > 2) {
      iframe = document.getElementById("JotFormIFrame-" + args[(args.length - 1)]);
    } else {
      iframe = document.getElementById("JotFormIFrame");
    }
    if (!iframe) { return; }

    switch (args[0]) {
      case "scrollIntoView":
        iframe.scrollIntoView();
        break;
      case "setHeight":
        iframe.style.height = args[1] + "px";
        break;
      case "collapseErrorPage":
        if (iframe.clientHeight > window.innerHeight) {
          iframe.style.height = window.innerHeight + "px";
        }
        break;
      case "reloadPage":
        window.location.reload();
        break;
      case "exitFullscreen":
        if (window.document.exitFullscreen) window.document.exitFullscreen();
        else if (window.document.mozCancelFullScreen) window.document.mozCancelFullScreen();
        else if (window.document.webkitExitFullscreen) window.document.webkitExitFullscreen();
        else if (window.document.msExitFullscreen) window.document.msExitFullscreen();
        break;
    }
  };

  if (window.addEventListener) {
    window.addEventListener("message", handleIFrameMessage, false);
  } else if (window.attachEvent) {
    window.attachEvent("onmessage", handleIFrameMessage);
  }
</script>
</body>
</html>
